services:
  - type: web
    name: madman-strategy-scanner
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 300 --preload
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
    healthCheckPath: /health
    autoDeploy: true
